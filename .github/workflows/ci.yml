name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby_version: .ruby-version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare database and assets
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          SECRET_KEY_BASE_DUMMY: 1
        run: |
          bin/rails db:test:prepare
          npm run build
          bin/rails assets:precompile

      - name: Run RSpec tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          SECRET_KEY_BASE_DUMMY: 1
        run: bundle exec rspec

      - name: Run Cucumber tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          SECRET_KEY_BASE_DUMMY: 1
          # RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}   # uncomment if needed
        run: bundle exec cucumber

      # Optional but highly recommended for debugging failing @javascript scenarios
      - name: Upload screenshots from failed Cucumber tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cucumber-screenshots
          path: ${{ github.workspace }}/tmp/capybara
          if-no-files-found: warn

      - name: Upload Cucumber reports (if you generate HTML reports)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: ${{ github.workspace }}/tmp/cucumber
          if-no-files-found: ignore
